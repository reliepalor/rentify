<div *ngIf="loadingService.visible()" class="fixed inset-0 z-[70] flex items-center justify-center p-4">
  <div class="absolute inset-0 bg-slate-900/45 backdrop-blur-[2px]"></div>

  <div class="relative w-full max-w-sm rounded-2xl border border-slate-200 bg-white/95 px-6 py-7 shadow-2xl">
    <div class="mx-auto h-14 w-14 rounded-full border-4 border-slate-200 border-t-blue-600 animate-spin"></div>

    <div class="mt-5 flex items-center justify-center gap-1.5">
      <span class="h-2 w-2 rounded-full bg-blue-500 animate-bounce [animation-delay:-0.2s]"></span>
      <span class="h-2 w-2 rounded-full bg-blue-500 animate-bounce [animation-delay:-0.1s]"></span>
      <span class="h-2 w-2 rounded-full bg-blue-500 animate-bounce"></span>
    </div>

    <p class="mt-4 text-center text-sm font-medium text-slate-700">
      {{ loadingService.message() }}
    </p>
  </div>
</div>
