<header
  class="tenant-glass-header fixed top-0 left-0 right-0 z-50"
  [class.header-visible]="isHeaderVisible"
  [class.header-hidden]="!isHeaderVisible"
>
  <div class="container mx-auto px-6 md:px-10 py-5">
    <div class="flex items-center justify-between">
      <!-- Logo -->
      <div class="tenant-readable text-3xl font-semibold text-stone-100" style="font-family: Georgia, 'Times New Roman', serif; letter-spacing: -0.01em;">
        Rentify
      </div>

      <!-- Navigation -->
      <nav class="hidden md:flex items-center space-x-10">
        <a 
          *ngFor="let item of menuItems; let i = index"
          [href]="item.href"
          (click)="onMenuClick(i)"
          [class]="item.active ? 'tenant-readable text-emerald-300 border-b-2 border-emerald-300 pb-1' : 'tenant-readable text-stone-100 hover:text-emerald-200 transition-colors'"
          class="text-[15px] font-semibold"
        >
          {{ item.label }}
        </a>
      </nav>

      <!-- Action Buttons -->
      <div class="flex items-center space-x-4">
        <button class="hidden md:flex items-center space-x-2 px-4 py-2 tenant-readable text-stone-50 border border-white/45 rounded-lg bg-white/10 hover:bg-white/18 transition-all">
          <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24">
            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M16 7a4 4 0 11-8 0 4 4 0 018 0zM12 14a7 7 0 00-7 7h14a7 7 0 00-7-7z" />
          </svg>
          <span class="text-sm">Profile</span>
        </button>
        
        <button
          (click)="openAuthPanel('login')"
          class="px-6 py-2 bg-emerald-700/90 text-white rounded-lg hover:bg-emerald-800 transition-all font-medium text-sm shadow-sm shadow-emerald-950/25"
        >
          Login
        </button>

        <!-- Mobile Menu Button -->
        <button class="md:hidden tenant-readable text-stone-100">
          <svg class="w-6 h-6" fill="none" stroke="currentColor" viewBox="0 0 24 24">
            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M4 6h16M4 12h16M4 18h16" />
          </svg>
        </button>
      </div>
    </div>
  </div>
</header>

<div
  *ngIf="isAuthPanelMounted"
  class="auth-panel-overlay fixed inset-0 z-[70] bg-black/45 backdrop-blur-[1px]"
  [class.auth-panel-overlay-open]="isAuthPanelOpen"
  [class.auth-panel-overlay-closed]="!isAuthPanelOpen"
  (click)="onOverlayClick($event)"
>
  <aside
    class="auth-panel fixed top-0 right-0 h-full w-full max-w-md bg-stone-50/95 backdrop-blur-xl border-l border-white/60 shadow-2xl"
    [class.auth-panel-open]="isAuthPanelOpen"
    [class.auth-panel-closed]="!isAuthPanelOpen"
  >
    <div class="h-full flex flex-col">
      <div class="flex items-center justify-between px-6 py-5 border-b border-stone-200/80">
        <h2 class="text-lg font-semibold text-stone-800">{{ authMode === 'login' ? 'Sign In' : 'Create Account' }}</h2>
        <button
          type="button"
          (click)="closeAuthPanel()"
          class="text-stone-500 hover:text-stone-800 transition-colors"
          aria-label="Close authentication panel"
        >
          <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24">
            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M6 18L18 6M6 6l12 12" />
          </svg>
        </button>
      </div>

      <div class="flex-1 overflow-hidden">
        <div class="auth-track h-full flex" [style.transform]="authMode === 'login' ? 'translateX(0%)' : 'translateX(-50%)'">
          <section
            class="w-1/2 h-full overflow-y-auto px-6 py-6 auth-mode-pane"
            [class.auth-mode-pane-active]="authMode === 'login'"
            [class.auth-mode-pane-inactive]="authMode !== 'login'"
          >
            <p class="text-sm text-stone-600 mb-5">Welcome back to Rentify.</p>

            <button
              type="button"
              (click)="onGoogleLogin()"
              [disabled]="authLoading"
              class="w-full flex items-center justify-center gap-3 mb-4 border border-stone-300 bg-white hover:bg-stone-50 disabled:opacity-70 text-stone-800 font-medium py-2.5 rounded-xl transition-colors"
            >
              <svg class="w-4 h-4" viewBox="0 0 24 24" aria-hidden="true">
                <path fill="#EA4335" d="M12 10.2v3.9h5.5c-.2 1.2-1.5 3.6-5.5 3.6-3.3 0-6-2.7-6-6s2.7-6 6-6c1.9 0 3.2.8 3.9 1.5l2.7-2.6C16.9 3 14.6 2 12 2 6.5 2 2 6.5 2 12s4.5 10 10 10c5.8 0 9.6-4.1 9.6-9.8 0-.7-.1-1.3-.2-2H12z"/>
              </svg>
              <span>{{ authLoading ? 'Please wait...' : 'Continue with Google' }}</span>
            </button>

            <div class="flex items-center gap-3 mb-4">
              <div class="h-px flex-1 bg-stone-300"></div>
              <span class="text-xs uppercase tracking-wide text-stone-500">or</span>
              <div class="h-px flex-1 bg-stone-300"></div>
            </div>

            <form (ngSubmit)="onLoginSubmit()" class="space-y-4">
              <div>
                <label class="block text-sm font-medium text-stone-700 mb-1">Email</label>
                <input
                  type="email"
                  [(ngModel)]="loginEmail"
                  name="loginEmail"
                  required
                  class="w-full px-4 py-2.5 border border-stone-300 rounded-xl bg-white/85 focus:outline-none focus:ring-2 focus:ring-emerald-600/35 focus:border-emerald-600/45"
                  placeholder="you@example.com"
                />
              </div>

              <div>
                <label class="block text-sm font-medium text-stone-700 mb-1">Password</label>
                <input
                  type="password"
                  [(ngModel)]="loginPassword"
                  name="loginPassword"
                  required
                  class="w-full px-4 py-2.5 border border-stone-300 rounded-xl bg-white/85 focus:outline-none focus:ring-2 focus:ring-emerald-600/35 focus:border-emerald-600/45"
                  placeholder="••••••••"
                />
              </div>

              <button
                type="submit"
                [disabled]="authLoading"
                class="w-full mt-2 bg-emerald-700 hover:bg-emerald-800 disabled:bg-emerald-500 text-white font-semibold py-3 rounded-xl transition-colors"
              >
                {{ authLoading ? 'Signing in...' : 'Sign In' }}
              </button>
            </form>

            <p class="text-sm text-stone-600 mt-5">
              Don't have an account?
              <button
                type="button"
                (click)="showRegister()"
                class="text-emerald-700 hover:text-emerald-800 font-semibold"
              >
                Register
              </button>
            </p>
          </section>

          <section
            class="w-1/2 h-full overflow-y-auto px-6 py-6 auth-mode-pane"
            [class.auth-mode-pane-active]="authMode === 'register'"
            [class.auth-mode-pane-inactive]="authMode !== 'register'"
          >
            <p class="text-sm text-stone-600 mb-5">Create your account in a minute.</p>

            <button
              type="button"
              (click)="onGoogleRegister()"
              [disabled]="authLoading"
              class="w-full flex items-center justify-center gap-3 mb-4 border border-stone-300 bg-white hover:bg-stone-50 disabled:opacity-70 text-stone-800 font-medium py-2.5 rounded-xl transition-colors"
            >
              <svg class="w-4 h-4" viewBox="0 0 24 24" aria-hidden="true">
                <path fill="#EA4335" d="M12 10.2v3.9h5.5c-.2 1.2-1.5 3.6-5.5 3.6-3.3 0-6-2.7-6-6s2.7-6 6-6c1.9 0 3.2.8 3.9 1.5l2.7-2.6C16.9 3 14.6 2 12 2 6.5 2 2 6.5 2 12s4.5 10 10 10c5.8 0 9.6-4.1 9.6-9.8 0-.7-.1-1.3-.2-2H12z"/>
              </svg>
              <span>{{ authLoading ? 'Please wait...' : 'Continue with Google' }}</span>
            </button>

            <div class="flex items-center gap-3 mb-4">
              <div class="h-px flex-1 bg-stone-300"></div>
              <span class="text-xs uppercase tracking-wide text-stone-500">or</span>
              <div class="h-px flex-1 bg-stone-300"></div>
            </div>

            <form (ngSubmit)="onRegisterSubmit()" class="space-y-4">
              <div>
                <label class="block text-sm font-medium text-stone-700 mb-1">Email</label>
                <input
                  type="email"
                  [(ngModel)]="registerEmail"
                  name="registerEmail"
                  required
                  class="w-full px-4 py-2.5 border border-stone-300 rounded-xl bg-white/85 focus:outline-none focus:ring-2 focus:ring-emerald-600/35 focus:border-emerald-600/45"
                  placeholder="you@example.com"
                />
              </div>

              <div>
                <label class="block text-sm font-medium text-stone-700 mb-1">Password</label>
                <div class="relative">
                  <input
                    [type]="showRegisterPassword ? 'text' : 'password'"
                    [(ngModel)]="registerPassword"
                    name="registerPassword"
                    required
                    class="w-full px-4 py-2.5 pr-11 border border-stone-300 rounded-xl bg-white/85 focus:outline-none focus:ring-2 focus:ring-emerald-600/35 focus:border-emerald-600/45"
                    placeholder="••••••••"
                  />
                  <button
                    type="button"
                    (click)="toggleRegisterPasswordVisibility()"
                    class="absolute inset-y-0 right-0 px-3 text-stone-500 hover:text-stone-700"
                    [attr.aria-label]="showRegisterPassword ? 'Hide password' : 'Show password'">
                    <svg *ngIf="!showRegisterPassword" xmlns="http://www.w3.org/2000/svg" class="h-5 w-5" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="1.8">
                      <path stroke-linecap="round" stroke-linejoin="round" d="M2.458 12C3.732 7.943 7.523 5 12 5c4.478 0 8.268 2.943 9.542 7-1.274 4.057-5.064 7-9.542 7-4.477 0-8.268-2.943-9.542-7z" />
                      <circle cx="12" cy="12" r="3" />
                    </svg>
                    <svg *ngIf="showRegisterPassword" xmlns="http://www.w3.org/2000/svg" class="h-5 w-5" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="1.8">
                      <path stroke-linecap="round" stroke-linejoin="round" d="M3 3l18 18" />
                      <path stroke-linecap="round" stroke-linejoin="round" d="M10.584 10.587A2 2 0 0012 14a2 2 0 001.413-3.415" />
                      <path stroke-linecap="round" stroke-linejoin="round" d="M9.88 5.09A9.77 9.77 0 0112 5c4.478 0 8.268 2.943 9.542 7a9.748 9.748 0 01-4.098 5.135M6.228 6.228A9.75 9.75 0 002.458 12c1.274 4.057 5.065 7 9.542 7a9.77 9.77 0 005.09-1.424" />
                    </svg>
                  </button>
                </div>
              </div>

              <div>
                <label class="block text-sm font-medium text-stone-700 mb-1">Confirm Password</label>
                <div class="relative">
                  <input
                    [type]="showRegisterConfirmPassword ? 'text' : 'password'"
                    [(ngModel)]="registerConfirmPassword"
                    name="registerConfirmPassword"
                    required
                    class="w-full px-4 py-2.5 pr-11 border border-stone-300 rounded-xl bg-white/85 focus:outline-none focus:ring-2 focus:ring-emerald-600/35 focus:border-emerald-600/45"
                    placeholder="••••••••"
                  />
                  <button
                    type="button"
                    (click)="toggleRegisterConfirmPasswordVisibility()"
                    class="absolute inset-y-0 right-0 px-3 text-stone-500 hover:text-stone-700"
                    [attr.aria-label]="showRegisterConfirmPassword ? 'Hide confirm password' : 'Show confirm password'">
                    <svg *ngIf="!showRegisterConfirmPassword" xmlns="http://www.w3.org/2000/svg" class="h-5 w-5" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="1.8">
                      <path stroke-linecap="round" stroke-linejoin="round" d="M2.458 12C3.732 7.943 7.523 5 12 5c4.478 0 8.268 2.943 9.542 7-1.274 4.057-5.064 7-9.542 7-4.477 0-8.268-2.943-9.542-7z" />
                      <circle cx="12" cy="12" r="3" />
                    </svg>
                    <svg *ngIf="showRegisterConfirmPassword" xmlns="http://www.w3.org/2000/svg" class="h-5 w-5" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="1.8">
                      <path stroke-linecap="round" stroke-linejoin="round" d="M3 3l18 18" />
                      <path stroke-linecap="round" stroke-linejoin="round" d="M10.584 10.587A2 2 0 0012 14a2 2 0 001.413-3.415" />
                      <path stroke-linecap="round" stroke-linejoin="round" d="M9.88 5.09A9.77 9.77 0 0112 5c4.478 0 8.268 2.943 9.542 7a9.748 9.748 0 01-4.098 5.135M6.228 6.228A9.75 9.75 0 002.458 12c1.274 4.057 5.065 7 9.542 7a9.77 9.77 0 005.09-1.424" />
                    </svg>
                  </button>
                </div>
              </div>

              <div>
                <label class="block text-sm font-medium text-stone-700 mb-2">Register As</label>
                <div class="grid grid-cols-2 gap-3">
                  <button
                    type="button"
                    (click)="selectedRole = 'tenant'"
                    [class]="selectedRole === 'tenant' ? 'bg-emerald-700 text-white' : 'bg-stone-200 text-stone-700'"
                    class="py-2.5 rounded-xl font-medium transition-colors"
                  >
                    Tenant
                  </button>
                  <button
                    type="button"
                    (click)="selectedRole = 'landlord'"
                    [class]="selectedRole === 'landlord' ? 'bg-emerald-700 text-white' : 'bg-stone-200 text-stone-700'"
                    class="py-2.5 rounded-xl font-medium transition-colors"
                  >
                    Landlord
                  </button>
                </div>
              </div>

              <button
                type="submit"
                [disabled]="authLoading"
                class="w-full mt-2 bg-emerald-700 hover:bg-emerald-800 disabled:bg-emerald-500 text-white font-semibold py-3 rounded-xl transition-colors"
              >
                {{ authLoading ? 'Creating account...' : 'Create Account' }}
              </button>
            </form>

            <p class="text-sm text-stone-600 mt-5">
              Already have an account?
              <button
                type="button"
                (click)="showLogin()"
                class="text-emerald-700 hover:text-emerald-800 font-semibold"
              >
                Sign In
              </button>
            </p>
          </section>
        </div>
      </div>
    </div>
  </aside>
</div>
