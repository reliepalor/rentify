<div class="h-full flex flex-col bg-white border-r border-gray-200">
  <!-- Logo -->
  <div class="p-6 border-b border-gray-100">
    <div class="flex items-center gap-3">
      <div class="w-8 h-8 bg-green-600 rounded-xl flex items-center justify-center text-white font-bold">R</div>
      <span class="font-semibold text-xl text-gray-900" [class.hidden]="isCollapsed">Rentify</span>
    </div>
  </div>

  <!-- Menu -->
  <div class="flex-1 px-3 py-6 overflow-y-auto">
    <nav class="space-y-2">
      <a routerLink="/landlord" [routerLinkActiveOptions]="{ exact: true }" routerLinkActive="bg-emerald-50 text-emerald-700"
         class="group flex items-center gap-3 px-4 py-3 rounded-xl text-gray-600 hover:bg-gray-50 hover:text-gray-900 transition-colors">
        <svg class="h-5 w-5 shrink-0" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" aria-hidden="true">
          <path stroke-linecap="round" stroke-linejoin="round" d="M4 13h6v7H4v-7Zm10-9h6v16h-6V4Zm-5 4h4v12H9V8Z" />
        </svg>
        <span [class.hidden]="isCollapsed">Dashboard</span>
      </a>

      <a routerLink="/landlord/properties" 
        routerLinkActive="bg-emerald-50 text-emerald-700"
        class="group flex items-center gap-3 px-4 py-3 rounded-xl text-gray-600 hover:bg-gray-50 hover:text-gray-900 transition-colors">
        <svg class="h-5 w-5 shrink-0" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" aria-hidden="true">
          <path stroke-linecap="round" stroke-linejoin="round" d="m3 10.5 9-7 9 7M5 9v10h14V9m-9 10v-6h4v6" />
        </svg>
        <span [class.hidden]="isCollapsed">My Properties</span>
      </a>

      <a routerLink="/landlord/applications" routerLinkActive="bg-emerald-50 text-emerald-700"
         class="group flex items-center gap-3 px-4 py-3 rounded-xl text-gray-600 hover:bg-gray-50 hover:text-gray-900 transition-colors">
        <svg class="h-5 w-5 shrink-0" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" aria-hidden="true">
          <path stroke-linecap="round" stroke-linejoin="round" d="M9 5h6M9 9h6M9 13h4m5 8H6a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h3l1-1h4l1 1h3a2 2 0 0 1 2 2v14a2 2 0 0 1-2 2Z" />
        </svg>
        <span [class.hidden]="isCollapsed">Applications</span>
      </a>

      <a routerLink="/landlord/billing" routerLinkActive="bg-emerald-50 text-emerald-700"
         class="group flex items-center gap-3 px-4 py-3 rounded-xl text-gray-600 hover:bg-gray-50 hover:text-gray-900 transition-colors">
        <svg class="h-5 w-5 shrink-0" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" aria-hidden="true">
          <path stroke-linecap="round" stroke-linejoin="round" d="M12 1v22M17 5.5a4 4 0 0 0-4-2.5H10a4 4 0 0 0 0 8h4a4 4 0 1 1 0 8H9a4 4 0 0 1-4-3" />
        </svg>
        <span [class.hidden]="isCollapsed">Billing & Payments</span>
      </a>

      <a routerLink="/landlord/rentals" routerLinkActive="bg-emerald-50 text-emerald-700"
         class="group flex items-center gap-3 px-4 py-3 rounded-xl text-gray-600 hover:bg-gray-50 hover:text-gray-900 transition-colors">
        <svg class="h-5 w-5 shrink-0" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" aria-hidden="true">
          <path stroke-linecap="round" stroke-linejoin="round" d="M12 1v22M17 5.5a4 4 0 0 0-4-2.5H10a4 4 0 0 0 0 8h4a4 4 0 1 1 0 8H9a4 4 0 0 1-4-3" />
        </svg>
        <span [class.hidden]="isCollapsed">Rentals</span>
      </a>
    </nav>
  </div>

  <!-- Footer -->
  <div class="mt-auto shrink-0 p-4 border-t border-gray-100 bg-white/95 backdrop-blur-sm">
    <div class="flex items-center gap-3 rounded-xl border border-gray-100 bg-gray-50/70 p-3 transition-all duration-300">
      <div class="h-9 w-9 shrink-0 rounded-full bg-emerald-100 text-emerald-700 flex items-center justify-center text-sm font-semibold">
        {{ landlordName().charAt(0) || 'L' }}
      </div>

      <div class="min-w-0 transition-all duration-300" [class.hidden]="isCollapsed">
        <p class="text-sm font-medium text-gray-900 truncate">{{ landlordName() }}</p>
        <p class="text-xs text-gray-500">Landlord</p>
      </div>

      <button
        (click)="logout()"
        class="ml-auto inline-flex h-9 w-9 items-center justify-center rounded-lg text-gray-600 hover:bg-gray-100 hover:text-gray-900 transition-colors"
        [attr.aria-label]="'Logout'">
        <svg class="h-5 w-5" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" aria-hidden="true">
          <path stroke-linecap="round" stroke-linejoin="round" d="M15 3h4a2 2 0 0 1 2 2v14a2 2 0 0 1-2 2h-4M10 17l5-5-5-5M15 12H3" />
        </svg>
      </button>
    </div>
  </div>
</div>
