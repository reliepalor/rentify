<div class="h-full flex flex-col bg-white border-r border-gray-200">
  <!-- Logo -->
  <div class="p-6 border-b border-gray-100">
    <div class="flex items-center gap-3">
      <div class="w-8 h-8 bg-green-600 rounded-xl flex items-center justify-center text-white font-bold">R</div>
      <span class="font-bold text-xl" [class.hidden]="isCollapsed">Rentify</span>
    </div>
  </div>

  <!-- Menu -->
  <div class="flex-1 px-3 py-6 overflow-y-auto">
    <nav class="space-y-1">
      <a routerLink="/landlord" routerLinkActive="active-link" 
         class="flex items-center gap-3 px-4 py-3 rounded-2xl text-gray-700 hover:bg-gray-100 transition">
        <span class="text-xl">📊</span>
        <span [class.hidden]="isCollapsed">Dashboard</span>
      </a>

      <a routerLink="/landlord/properties" 
        routerLinkActive="active-link" 
        class="flex items-center gap-3 px-4 py-3 rounded-2xl text-gray-700 hover:bg-gray-100 transition">
        <span class="text-xl">🏠</span>
        <span [class.hidden]="isCollapsed">My Properties</span>
      </a>

      <a routerLink="/landlord/applications" routerLinkActive="active-link" 
         class="flex items-center gap-3 px-4 py-3 rounded-2xl text-gray-700 hover:bg-gray-100 transition">
        <span class="text-xl">📋</span>
        <span [class.hidden]="isCollapsed">Applications</span>
      </a>

      <a routerLink="/landlord/billing" routerLinkActive="active-link" 
         class="flex items-center gap-3 px-4 py-3 rounded-2xl text-gray-700 hover:bg-gray-100 transition">
        <span class="text-xl">💰</span>
        <span [class.hidden]="isCollapsed">Billing & Payments</span>
      </a>
    </nav>
  </div>

  <!-- Footer -->
  <div class="p-4 border-t border-gray-100">
    <button (click)="logout()" 
            class="w-full flex items-center gap-3 px-4 py-3 text-red-600 hover:bg-red-50 rounded-2xl">
      <span class="text-xl">🚪</span>
      <span [class.hidden]="isCollapsed">Logout</span>
    </button>
  </div>
</div>
