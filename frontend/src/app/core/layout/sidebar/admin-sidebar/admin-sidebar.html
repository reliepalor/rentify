<div class="h-full flex flex-col bg-white border-r border-gray-200">
  <!-- Logo -->
  <div class="p-6 border-b border-gray-100">
    <div class="flex items-center gap-3">
      <div class="w-8 h-8 bg-emerald-600 rounded-xl flex items-center justify-center text-white font-bold">R</div>
      <span class="font-semibold text-xl text-gray-900" [class.hidden]="isCollapsed">Rentify</span>
    </div>
  </div>

  <!-- Menu -->
  <div class="flex-1 px-3 py-6 overflow-y-auto">
    <nav class="space-y-2">
      <a routerLink="/admin" [routerLinkActiveOptions]="{ exact: true }" routerLinkActive="bg-emerald-50 text-emerald-700"
         class="group flex items-center gap-3 px-4 py-3 rounded-xl text-gray-600 hover:bg-gray-50 hover:text-gray-900 transition-colors">
        <svg class="h-5 w-5 shrink-0" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" aria-hidden="true">
          <path stroke-linecap="round" stroke-linejoin="round" d="M4 13h6v7H4v-7Zm10-9h6v16h-6V4Zm-5 4h4v12H9V8Z" />
        </svg>
        <span [class.hidden]="isCollapsed">Dashboard</span>
      </a>

      <a routerLink="/admin/users" routerLinkActive="bg-emerald-50 text-emerald-700"
         class="group flex items-center gap-3 px-4 py-3 rounded-xl text-gray-600 hover:bg-gray-50 hover:text-gray-900 transition-colors">
        <svg class="h-5 w-5 shrink-0" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" aria-hidden="true">
          <path stroke-linecap="round" stroke-linejoin="round" d="M16 21v-2a4 4 0 0 0-4-4H6a4 4 0 0 0-4 4v2m20 0v-2a4 4 0 0 0-3-3.87M15 7a4 4 0 1 1-8 0 4 4 0 0 1 8 0Zm7 14v-2a4 4 0 0 0-3-3.87M18 3a4 4 0 0 1 0 8" />
        </svg>
        <span [class.hidden]="isCollapsed">Manage Users</span>
      </a>

      <a routerLink="/admin/properties" routerLinkActive="bg-emerald-50 text-emerald-700"
         class="group flex items-center gap-3 px-4 py-3 rounded-xl text-gray-600 hover:bg-gray-50 hover:text-gray-900 transition-colors">
        <svg class="h-5 w-5 shrink-0" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" aria-hidden="true">
          <path stroke-linecap="round" stroke-linejoin="round" d="m3 10.5 9-7 9 7M5 9v10h14V9m-9 10v-6h4v6" />
        </svg>
        <span [class.hidden]="isCollapsed">Properties</span>
      </a>

      <!-- <a routerLink="/admin/reports" routerLinkActive="bg-emerald-50 text-emerald-700"
         class="group flex items-center gap-3 px-4 py-3 rounded-xl text-gray-600 hover:bg-gray-50 hover:text-gray-900 transition-colors">
        <svg class="h-5 w-5 shrink-0" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" aria-hidden="true">
          <path stroke-linecap="round" stroke-linejoin="round" d="M3 3v18h18M7 14l4-4 3 3 5-6" />
        </svg>
        <span [class.hidden]="isCollapsed">Reports</span>
      </a> -->
    </nav>
  </div>

  <!-- Footer -->
  <div class="mt-auto shrink-0 p-4 border-t border-gray-100 bg-white/95 backdrop-blur-sm">
    <button
      title="Logout" 
      (click)="logout()" 
            class="w-full flex items-center gap-3 px-4 py-3 text-gray-600 hover:bg-gray-50 hover:text-gray-900 rounded-xl transition-colors">
      <svg class="h-5 w-5 shrink-0" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" aria-hidden="true">
        <path stroke-linecap="round" stroke-linejoin="round" d="M15 3h4a2 2 0 0 1 2 2v14a2 2 0 0 1-2 2h-4M10 17l5-5-5-5M15 12H3" />
      </svg>
      <span [class.hidden]="isCollapsed">Logout</span>
    </button>
  </div>
</div>
