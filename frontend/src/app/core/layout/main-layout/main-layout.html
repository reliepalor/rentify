<div class="flex h-screen overflow-hidden bg-gray-50">

  <!-- Sidebar (Desktop) -->
  <div 
    [class]="isSidebarCollapsed ? 'w-20' : 'w-72'" 
    class="hidden md:flex flex-col transition-all duration-300 border-r border-gray-200 bg-white shadow-sm">

    <app-admin-sidebar 
      *ngIf="role === 'admin'" 
      [isCollapsed]="isSidebarCollapsed">
    </app-admin-sidebar>

    <app-landlord-sidebar 
      *ngIf="role === 'landlord'" 
      [isCollapsed]="isSidebarCollapsed">
    </app-landlord-sidebar>
  </div>

  <!-- Main Content Area -->
  <div class="flex-1 flex flex-col min-w-0 overflow-hidden">

    <!-- Top Header -->
    <header class="bg-white border-b border-gray-200 px-6 py-4 flex items-center justify-between shadow-sm">
      <div class="flex items-center gap-4">
        <!-- Mobile Hamburger -->
        <button 
          (click)="toggleSidebar()" 
          class="md:hidden p-2 text-gray-600 hover:bg-gray-100 rounded-xl">
          ☰
        </button>

        <h1 class="text-xl font-semibold text-gray-800">
          {{ role === 'admin' ? 'Admin Panel' : 'Landlord Dashboard' }}
        </h1>
      </div>

      <div class="flex items-center gap-4">
        <div class="text-sm text-gray-600 hidden sm:block">
          {{ role | titlecase }}
        </div>
        <button 
          (click)="logout()"
          class="px-5 py-2 text-sm font-medium text-red-600 hover:bg-red-50 rounded-2xl transition-colors">
          Logout
        </button>
      </div>
    </header>

    <!-- Page Content -->
    <main class="flex-1 overflow-auto p-6 bg-gray-50">
      <router-outlet></router-outlet>
    </main>
  </div>

</div>
