<app-header></app-header>


<!-- Hero Section - Styled like Villa Serena -->
<section class="relative min-h-screen flex items-center justify-center overflow-hidden">
  
  <!-- Background Image with Overlay -->
  <div class="absolute inset-0 z-0">
    <img
      src="/house.png"
      alt="Boarding house exterior"
      class="w-full h-full object-cover"
    />
    <div class="absolute inset-0 bg-gradient-to-b from-black/40 via-black/30 to-black/50"></div>
  </div>

  <!-- Hero Content -->
  <div class="relative z-10 container mx-auto max-w-7xl px-6 md:px-10 pt-20 md:pt-32 pb-12 text-center">
    
    <!-- Top Tag / Subtitle -->
    <div class="inline-flex items-center rounded-full bg-white/10 backdrop-blur-sm border border-white/30 px-6 py-2 text-xs md:text-sm font-medium tracking-[0.08em] uppercase text-white/95 mb-6">
      SMART BOARDING HOUSE LIVING
    </div>

    <!-- Main Heading -->
    <h1 class="text-[2.65rem] md:text-[4.1rem] leading-[1.05] font-semibold text-white tracking-[-0.02em] mb-6">
      Where Comfort Meets<br>
      <span class="text-emerald-300">Boarding House Simplicity</span>
    </h1>

    <!-- Description -->
    <p class="text-white/90 text-[1.05rem] md:text-[1.25rem] max-w-3xl mx-auto leading-relaxed mb-10 font-light">
      Discover verified rooms with transparent pricing and direct owner contact in one calm, 
      easy-to-use platform.
    </p>

    <!-- CTA Buttons -->
    <div class="flex flex-col sm:flex-row items-center justify-center gap-4 mb-12">
      <button
        (click)="exploreAccommodations()"
        class="w-full sm:w-auto px-10 py-4 bg-emerald-600 hover:bg-emerald-700 text-white font-semibold rounded-lg text-lg transition-all shadow-xl shadow-emerald-950/30"
      >
        Explore Rooms
      </button>
      
      <button
        (click)="learnMore()"
        class="w-full sm:w-auto px-10 py-4 border border-white/70 hover:border-white text-white font-semibold rounded-lg text-lg backdrop-blur-sm transition-all"
      >
        Learn More
      </button>
    </div>

<!-- Search Box -->

    <div class="max-w-4xl mx-auto bg-stone-50/95 backdrop-blur-sm rounded-2xl shadow-2xl p-6 border border-stone-200/80">

      <div class="grid grid-cols-1 md:grid-cols-4 gap-4">

        <!-- Check-in -->

        <div class="flex flex-col">

          <label class="text-xs text-stone-500 uppercase tracking-wide mb-2 font-medium">

            Start Date

          </label>

          <div class="relative">

            <input 

              type="date" 

              [(ngModel)]="checkInDate"

              class="w-full px-4 py-3 border border-stone-300 rounded-lg focus:outline-none focus:ring-2 focus:ring-emerald-600/40 focus:border-emerald-600 text-stone-700 bg-white"

              placeholder="Select"

            />

          </div>

        </div>



        <!-- Check-out -->

        <div class="flex flex-col">

          <label class="text-xs text-stone-500 uppercase tracking-wide mb-2 font-medium">

            End Date

          </label>

          <div class="relative">

            <input 

              type="date" 

              [(ngModel)]="checkOutDate"

              class="w-full px-4 py-3 border border-stone-300 rounded-lg focus:outline-none focus:ring-2 focus:ring-emerald-600/40 focus:border-emerald-600 text-stone-700 bg-white"

              placeholder="Select"

            />

          </div>

        </div>



        <!-- Guests -->

        <div class="flex flex-col">

          <label class="text-xs text-stone-500 uppercase tracking-wide mb-2 font-medium">

            Tenants

          </label>

          <div class="relative">

            <select 

              [(ngModel)]="guests"

              class="w-full px-4 py-3 border border-stone-300 rounded-lg focus:outline-none focus:ring-2 focus:ring-emerald-600/40 focus:border-emerald-600 text-stone-700 appearance-none bg-white"

            >

              <option [value]="1">1 Tenant</option>

              <option [value]="2">2 Tenants</option>

              <option [value]="3">3 Tenants</option>

              <option [value]="4">4 Tenants</option>

              <option [value]="5">5+ Tenants</option>

            </select>

            <div class="pointer-events-none absolute inset-y-0 right-0 flex items-center px-3 text-stone-500">

              <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24">

                <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M19 9l-7 7-7-7" />

              </svg>

            </div>

          </div>

        </div>



        <!-- Search Button -->

        <div class="flex items-end">

          <button 

            (click)="onSearch()"

            class="w-full px-6 py-3 bg-emerald-700 text-white rounded-lg hover:bg-emerald-800 transition-all font-medium flex items-center justify-center space-x-2 shadow-md hover:shadow-lg"

          >

            <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24">

              <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M21 21l-6-6m2-5a7 7 0 11-14 0 7 7 0 0114 0z" />

            </svg>

            <span>Search</span>

          </button>

        </div>

      </div>

    </div>



  </div>
</section>
