<div class="min-h-screen bg-gray-50">
  <nav class="bg-white shadow-sm border-b">
    <div class="max-w-7xl mx-auto px-6 py-4 flex justify-between items-center">
      <div class="flex items-center gap-3">
        <h1 class="text-2xl font-bold text-gray-800">Rentify</h1>
        <span class="px-3 py-1 bg-green-100 text-green-700 text-xs font-medium rounded-full">Landlord</span>
      </div>
      
      <div class="flex items-center gap-6">
        <span class="text-sm text-gray-600">Welcome, Landlord</span>
        <button 
          (click)="logout()"
          class="px-5 py-2 bg-red-600 hover:bg-red-700 text-white text-sm font-medium rounded-2xl transition">
          Logout
        </button>
      </div>
    </div>
  </nav>

  <div class="max-w-7xl mx-auto px-6 py-8">
    <h1 class="text-3xl font-bold text-gray-800 mb-8">Landlord Dashboard</h1>

    <div class="grid grid-cols-1 md:grid-cols-3 gap-6 mb-10">
      <div class="bg-white p-6 rounded-3xl shadow">
        <p class="text-gray-500 text-sm">My Properties</p>
        <p class="text-4xl font-bold text-blue-600 mt-2">12</p>
      </div>
      <div class="bg-white p-6 rounded-3xl shadow">
        <p class="text-gray-500 text-sm">Current Tenants</p>
        <p class="text-4xl font-bold text-green-600 mt-2">34</p>
      </div>
      <div class="bg-white p-6 rounded-3xl shadow">
        <p class="text-gray-500 text-sm">Pending Applications</p>
        <p class="text-4xl font-bold text-orange-600 mt-2">7</p>
      </div>
    </div>

    <div class="bg-white rounded-3xl shadow p-8">
      <h2 class="text-xl font-semibold mb-4">Quick Actions</h2>
      <div class="grid grid-cols-2 gap-4">
        <button class="p-6 border-2 border-dashed border-gray-300 rounded-3xl hover:border-blue-500 transition text-left">
          <span class="text-2xl mb-2 block">🏠</span>
          <p class="font-medium">Add New Property</p>
        </button>
        <button class="p-6 border-2 border-dashed border-gray-300 rounded-3xl hover:border-blue-500 transition text-left">
          <span class="text-2xl mb-2 block">📋</span>
          <p class="font-medium">View Tenant Applications</p>
        </button>
      </div>
    </div>
  </div>
</div>
