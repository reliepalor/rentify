<div class="min-h-screen bg-gray-50">
  <nav class="bg-white shadow-sm border-b">
    <div class="max-w-7xl mx-auto px-6 py-4 flex justify-between items-center">
      <div class="flex items-center gap-3">
        <h1 class="text-2xl font-bold text-gray-800">Rentify</h1>
        <span class="px-3 py-1 bg-purple-100 text-purple-700 text-xs font-medium rounded-full">Tenant</span>
      </div>
      
      <div class="flex items-center gap-6">
        <span class="text-sm text-gray-600">Welcome, Tenant</span>
        <button 
          (click)="logout()"
          class="px-5 py-2 bg-red-600 hover:bg-red-700 text-white text-sm font-medium rounded-2xl transition">
          Logout
        </button>
      </div>
    </div>
  </nav>

  <div class="max-w-7xl mx-auto px-6 py-8">
    <h1 class="text-3xl font-bold text-gray-800 mb-8">Tenant Dashboard</h1>

    <div class="grid grid-cols-1 md:grid-cols-3 gap-6 mb-10">
      <div class="bg-white p-6 rounded-3xl shadow">
        <p class="text-gray-500 text-sm">My Room</p>
        <p class="text-2xl font-semibold text-blue-600 mt-2">Room 305 - Boarding House A</p>
      </div>
      <div class="bg-white p-6 rounded-3xl shadow">
        <p class="text-gray-500 text-sm">Next Due Date</p>
        <p class="text-2xl font-semibold text-red-600 mt-2">April 10, 2026</p>
      </div>
      <div class="bg-white p-6 rounded-3xl shadow">
        <p class="text-gray-500 text-sm">Outstanding Balance</p>
        <p class="text-2xl font-bold text-orange-600 mt-2">₱2,450</p>
      </div>
    </div>

    <div class="bg-white rounded-3xl shadow p-8">
      <h2 class="text-xl font-semibold mb-6">Quick Actions</h2>
      <div class="grid grid-cols-1 sm:grid-cols-3 gap-4">
        <button class="p-6 bg-blue-50 hover:bg-blue-100 rounded-3xl transition text-left">
          <span class="text-3xl mb-3 block">📋</span>
          <p class="font-medium">Browse Properties</p>
        </button>
        <button class="p-6 bg-green-50 hover:bg-green-100 rounded-3xl transition text-left">
          <span class="text-3xl mb-3 block">💰</span>
          <p class="font-medium">Make Payment</p>
        </button>
        <button class="p-6 bg-purple-50 hover:bg-purple-100 rounded-3xl transition text-left">
          <span class="text-3xl mb-3 block">💬</span>
          <p class="font-medium">Message Landlord</p>
        </button>
      </div>
    </div>
  </div>
</div>
