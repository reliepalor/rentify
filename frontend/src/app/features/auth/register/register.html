<div class="min-h-screen bg-gray-50 flex items-center justify-center py-12 px-4">
  <div class="max-w-md w-full">
    <div class="bg-white rounded-3xl shadow-xl p-8">
      
      <!-- Header -->
      <div class="text-center mb-8">
        <h1 class="text-3xl font-bold text-gray-900">Create Account</h1>
        <p class="text-gray-600 mt-2">Join Rentify as a Landlord or Tenant</p>
      </div>

      <!-- Google Sign Up Button -->
      <button 
        type="button"
        (click)="signInWithGoogle()"
        class="w-full flex items-center justify-center gap-3 bg-white border border-gray-300 hover:border-gray-400 py-3.5 rounded-2xl font-medium text-gray-700 transition mb-6">
        <img src="https://www.google.com/images/branding/googleg/1x/googleg_standard_color_64dp.png" 
             alt="Google" 
             class="w-5 h-5">
        Sign up with Google
      </button>

      <!-- Divider -->
      <div class="relative my-6">
        <div class="absolute inset-0 flex items-center">
          <div class="w-full border-t border-gray-300"></div>
        </div>
        <div class="relative flex justify-center text-sm">
          <span class="bg-white px-4 text-gray-500">or register with email</span>
        </div>
      </div>

      <!-- Form -->
      <form (ngSubmit)="onRegister()" class="space-y-6">
        
        <div>
          <label class="block text-sm font-medium text-gray-700 mb-1">Full Name</label>
          <input 
            type="text" 
            [(ngModel)]="fullName"
            name="fullName"
            required
            class="w-full px-4 py-3 border border-gray-300 rounded-2xl focus:outline-none focus:ring-2 focus:ring-blue-500"
            placeholder="Juan Dela Cruz">
        </div>

        <div>
          <label class="block text-sm font-medium text-gray-700 mb-1">Email Address</label>
          <input 
            type="email" 
            [(ngModel)]="email"
            name="email"
            required
            class="w-full px-4 py-3 border border-gray-300 rounded-2xl focus:outline-none focus:ring-2 focus:ring-blue-500"
            placeholder="you@example.com">
        </div>

        <div>
          <label class="block text-sm font-medium text-gray-700 mb-1">Password</label>
          <input 
            type="password" 
            [(ngModel)]="password"
            name="password"
            required
            class="w-full px-4 py-3 border border-gray-300 rounded-2xl focus:outline-none focus:ring-2 focus:ring-blue-500"
            placeholder="••••••••">
        </div>

        <div>
          <label class="block text-sm font-medium text-gray-700 mb-1">Confirm Password</label>
          <input 
            type="password" 
            [(ngModel)]="confirmPassword"
            name="confirmPassword"
            required
            class="w-full px-4 py-3 border border-gray-300 rounded-2xl focus:outline-none focus:ring-2 focus:ring-blue-500"
            placeholder="••••••••">
        </div>

        <div>
          <label class="block text-sm font-medium text-gray-700 mb-2">Register As</label>
          <div class="grid grid-cols-2 gap-4">
            <button 
              type="button"
              (click)="selectRole('tenant')"
              [class]="selectedRole === 'tenant' ? 'bg-blue-600 text-white' : 'bg-gray-100 text-gray-700'"
              class="py-3 rounded-2xl font-medium transition-all">
              Tenant
            </button>
            <button 
              type="button"
              (click)="selectRole('landlord')"
              [class]="selectedRole === 'landlord' ? 'bg-blue-600 text-white' : 'bg-gray-100 text-gray-700'"
              class="py-3 rounded-2xl font-medium transition-all">
              Landlord
            </button>
          </div>
        </div>

        <!-- Register Button -->
        <button 
          type="submit"
          [disabled]="loading"
          class="w-full bg-blue-600 hover:bg-blue-700 disabled:bg-blue-400 text-white font-semibold py-3.5 rounded-2xl transition-all duration-200">
          {{ loading ? 'Creating Account...' : 'Create Account' }}
        </button>
      </form>

      <!-- Login Link -->
      <div class="text-center mt-6">
        <p class="text-gray-600">
          Already have an account? 
          <a routerLink="/login" class="text-blue-600 hover:text-blue-700 font-medium">Sign in here</a>
        </p>
      </div>
    </div>

    <div class="text-center mt-6">
      <a routerLink="/" class="text-gray-500 hover:text-gray-700 text-sm">← Back to Home</a>
    </div>
  </div>
</div>
