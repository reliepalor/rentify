<div class="min-h-screen bg-gray-50 flex items-center justify-center py-12 px-4">
  <div class="max-w-md w-full">
    <!-- Card -->
    <div class="bg-white rounded-3xl shadow-xl p-8">
      
      <!-- Header -->
      <div class="text-center mb-8">
        <h1 class="text-3xl font-bold text-gray-900">Welcome Back</h1>
        <p class="text-gray-600 mt-2">Sign in to your Rentify account</p>
      </div>

      <!-- Google Login Button -->
      <button 
        (click)="signInWithGoogle()"
        class="w-full flex items-center justify-center gap-3 bg-white border border-gray-300 hover:border-gray-400 py-3.5 rounded-2xl font-medium text-gray-700 transition mb-6">
        <img src="https://www.google.com/images/branding/googleg/1x/googleg_standard_color_64dp.png" 
             alt="Google" 
             class="w-5 h-5">
        Continue with Google
      </button>

      <!-- Divider -->
      <div class="relative my-6">
        <div class="absolute inset-0 flex items-center">
          <div class="w-full border-t border-gray-300"></div>
        </div>
        <div class="relative flex justify-center text-sm">
          <span class="bg-white px-4 text-gray-500">or continue with email</span>
        </div>
      </div>

      <!-- Email Login Form -->
      <form (ngSubmit)="onLogin()" class="space-y-6">
        
        <div>
          <label class="block text-sm font-medium text-gray-700 mb-1">Email Address</label>
          <input 
            type="email" 
            [(ngModel)]="email"
            name="email"
            required
            class="w-full px-4 py-3 border border-gray-300 rounded-2xl focus:outline-none focus:ring-2 focus:ring-blue-500 focus:border-transparent"
            placeholder="you@example.com">
        </div>

        <div>
          <label class="block text-sm font-medium text-gray-700 mb-1">Password</label>
          <input 
            type="password" 
            [(ngModel)]="password"
            name="password"
            required
            class="w-full px-4 py-3 border border-gray-300 rounded-2xl focus:outline-none focus:ring-2 focus:ring-blue-500 focus:border-transparent"
            placeholder="••••••••">
        </div>

        <!-- Error Message -->
        <div *ngIf="errorMessage" class="text-red-600 text-sm text-center bg-red-50 p-3 rounded-2xl">
          {{ errorMessage }}
        </div>

        <!-- Login Button -->
        <button 
          type="submit"
          [disabled]="loading"
          class="w-full bg-blue-600 hover:bg-blue-700 disabled:bg-blue-400 text-white font-semibold py-3.5 rounded-2xl transition-all duration-200 flex items-center justify-center">
          <span *ngIf="loading" class="animate-spin mr-2">⟳</span>
          {{ loading ? 'Signing in...' : 'Sign In' }}
        </button>
      </form>

      <!-- Register Link -->
      <div class="text-center mt-6">
        <p class="text-gray-600">
          Don't have an account? 
          <a routerLink="/register" class="text-blue-600 hover:text-blue-700 font-medium">Register here</a>
        </p>
      </div>
    </div>

    <!-- Back to Landing -->
    <div class="text-center mt-6">
      <a routerLink="/" class="text-gray-500 hover:text-gray-700 text-sm flex items-center justify-center gap-1">
        ← Back to Home
      </a>
    </div>
  </div>
</div>
